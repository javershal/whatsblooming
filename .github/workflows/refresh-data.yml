name: Refresh Plant Data

on:
  schedule:
    # Quarterly: 8am UTC on January 1, April 1, July 1, October 1
    - cron: '0 8 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      shape_id:
        description: 'Calflora saved polygon shape id'
        required: false
        default: 'rs3899'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run data collection
        run: |
          python scripts/collect_data.py \
            --shape-id "${{ github.event.inputs.shape_id || 'rs3899' }}" \
            --existing data/plants.json \
            --output data/plants.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/plants.json
          git diff --staged --quiet || git commit -m "chore: quarterly plant data refresh $(date -u +%Y-%m-%d)"
          git push
